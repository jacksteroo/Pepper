services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pepper-postgres
    environment:
      POSTGRES_USER: pepper
      POSTGRES_PASSWORD: pepper
      POSTGRES_DB: pepper
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pepper"]
      interval: 5s
      timeout: 5s
      retries: 5

  pepper:
    build: .
    image: pepper:latest
    container_name: pepper-agent
    restart: unless-stopped
    env_file: .env
    environment:
      # Override localhost refs to use Docker service names
      POSTGRES_URL: postgresql+asyncpg://pepper:pepper@postgres:5432/pepper
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      RUNNING_IN_DOCKER: "1"
      PYTHONPATH: /app
      # Hermes-agent skills registry — read-only mount of the host path.
      # Override PEPPER_HERMES_SKILLS_PATH in .env to point elsewhere or disable.
      PEPPER_HERMES_SKILLS_PATH: /data/hermes-skills
      # WhatsApp send bridge — talks to the sibling service over the docker
      # network. PEPPER_WA_BRIDGE_TOKEN comes from .env (env_file above).
      PEPPER_WA_BRIDGE_URL: http://whatsapp-bridge:3025
    ports:
      - "8000:8000"
    volumes:
      # Google OAuth tokens + credentials
      - ${HOME}/.config/pepper:/root/.config/pepper:rw
      # HuggingFace model cache (sentence-transformers)
      - huggingface_cache:/root/.cache/huggingface
      # Persist mirrored application logs on the host
      - ./logs:/app/logs
      # Live-reload source during development
      - ./agent:/app/agent
      - ./subsystems:/app/subsystems
      # Project documentation — read-only. Pepper reads it for context but
      # must not write to it; mutable per-owner state lives in ./data below.
      - ./docs:/app/docs:ro
      # User-mutable state — life_context.md and any future per-owner files
      # Pepper writes back to. Gitignored on the host; survives rebuilds.
      - ./data:/app/data:rw
      # Skills — repo legacy skills (5 flat .md files) read-only
      - ./skills:/app/skills:ro
      # User-installed skills + anthropics registry mirror persist on host
      - ${HOME}/.pepper:/root/.pepper:rw
      # Hermes-agent skill registry (read-only) for skill_search/skill_install
      - /Users/jack/Developer/nousresearch/hermes-agent/skills:/data/hermes-skills:ro
      # iMessage — requires Docker Desktop to have Full Disk Access
      # (System Settings → Privacy & Security → Full Disk Access → Docker Desktop)
      - ${HOME}/Library/Messages:/data/messages:ro
      # WhatsApp Desktop — locked while WhatsApp is running; quit WhatsApp first
      - "${HOME}/Library/Group Containers/group.net.whatsapp.WhatsApp.shared:/data/whatsapp:ro"
    depends_on:
      postgres:
        condition: service_healthy
      whatsapp-bridge:
        # service_started, NOT service_healthy: the bridge is unhealthy until
        # QR pairing completes on first launch. Pepper can run fine without
        # the bridge — WhatsApp send tools will surface a clear error if the
        # bridge isn't ready yet, while every other channel keeps working.
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  whatsapp-bridge:
    build: ./subsystems/communications/whatsapp_bridge
    image: pepper-whatsapp-bridge:latest
    container_name: pepper-whatsapp-bridge
    restart: unless-stopped
    # Read PEPPER_WA_TOKEN (and any future bridge envs) straight from .env so
    # the user only manages one secrets file. The bridge's auth middleware
    # checks `x-pepper-token`, which Pepper sends as `PEPPER_WA_BRIDGE_TOKEN`
    # — we re-export the same value under both names below.
    env_file: .env
    environment:
      PORT: "3025"
      HOST: "0.0.0.0"
      PEPPER_WA_TOKEN: ${PEPPER_WA_BRIDGE_TOKEN:-}
    ports:
      # Bound to localhost only — never expose this port off-host.
      - "127.0.0.1:3025:3025"
    volumes:
      # Persistent WhatsApp Web session. Survives container rebuilds, so QR
      # pairing is one-time. WhatsApp itself may force a re-link if the phone
      # hasn't opened WhatsApp in ~14 days, but that's their policy.
      - whatsapp_session:/app/.wa_session
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3025/health | grep -q ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    image: node:20-alpine
    container_name: pepper-web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://pepper:8000
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
    depends_on:
      - pepper

  # ---------------------------------------------------------------------------
  # Cognitive archetypes (ADR-0004 + ADR-0006). Each archetype runs as its
  # own service, launched via `python -m agents.runner --archetype <name>`.
  # The first inhabitant — `agents-reflector` — is added in #39 by
  # uncommenting the block below and replacing `<archetype>`. Subsequent
  # archetypes (`monitor`, `researcher`) follow the same shape.
  #
  # Skeleton kept here so the diff in #39 is `-#` not "invent the service".
  # ---------------------------------------------------------------------------
  # agents-<archetype>:
  #   build: .
  #   image: pepper:latest
  #   container_name: pepper-agents-<archetype>
  #   restart: unless-stopped
  #   command: ["python", "-m", "agents.runner", "--archetype", "<archetype>"]
  #   # NOTE for #39: do NOT inherit Pepper Core's full `.env` here. An
  #   # archetype only needs POSTGRES_URL + its own archetype-specific
  #   # vars; pulling the whole env unnecessarily widens blast radius
  #   # (Google OAuth tokens, WhatsApp bridge token, API keys). When the
  #   # archetype role split lands (per ADR-0005 §"Postgres roles &
  #   # grants"), point POSTGRES_URL at the per-archetype role
  #   # (`pepper_traces_reader` for read-only archetypes) rather than
  #   # the superuser-equivalent `pepper:pepper`.
  #   environment:
  #     POSTGRES_URL: postgresql+asyncpg://pepper:pepper@postgres:5432/pepper
  #     PYTHONPATH: /app
  #   volumes:
  #     # Source mounts are :ro — agents write only to Postgres, never to
  #     # their own source tree. The shared `agent.traces.*` reader is the
  #     # documented surface; everything else is forbidden by the lint at
  #     # `agent/tests/test_agents_isolation.py`.
  #     - ./agents:/app/agents:ro
  #     - ./agent:/app/agent:ro
  #     - ./logs:/app/logs
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: pepper-tunnel
  #   restart: unless-stopped
  #   command: tunnel run pepper
  #   volumes:
  #     - ~/.cloudflared:/home/nonroot/.cloudflared:ro
  #   depends_on:
  #     - pepper

volumes:
  postgres_data:
  huggingface_cache:
  whatsapp_session:
